name: VaultPay CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Verify Dependencies
      run: go mod verify

    # 1. NEW: Enterprise Linting
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest

    # 2. UPGRADED: Race Detector added to tests
    - name: Run Test Suite with Race Detector
      run: go test ./... -race -v -cover

    # 3. UPGRADED: Push to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # Replace 'shreyas9866' with your actual Docker Hub username if different
        tags: shreyas9866/vaultpay-api:latest