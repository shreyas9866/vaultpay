version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vaultpay-postgres
    environment:
      POSTGRES_USER: vaultpay_user
      POSTGRES_PASSWORD: vaultpay_password
      POSTGRES_DB: vaultpay
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultpay_user -d vaultpay"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vaultpay-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: vaultpay-api:v1
    container_name: vaultpay-api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://vaultpay_user:vaultpay_password@postgres:5432/vaultpay?sslmode=disable
      - REDIS_ADDR=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy