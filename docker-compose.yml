version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vaultpay-postgres
    environment:
      POSTGRES_USER: vaultpay_user
      POSTGRES_PASSWORD: vaultpay_password
      POSTGRES_DB: vaultpay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vaultpay-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: